services:
    biolak:
        container_name: biolak
        # ports:
        #     - '3000:3000'
        image: ghcr.io/delnegend/biolak:latest
        volumes: [ ./data:/app/data:Z ]
        environment:
            DATABASE_URI: "file:/app/data.sqlite3"

            NEXT_PUBLIC_SERVER_URL: "https://biolak.vn"
            PAYLOAD_SECRET: "CHANGEME"
            CRON_SECRET: "CHANGEME"
            PREVIEW_SECRET: "CHANGEME"

            SMTP_FROM: ""
            SMTP_HOST: ""
            SMTP_PORT: ""
            SMTP_USER: ""
            SMTP_PASS: ""
        networks: [ biolak-network ]

    cloudflared:
        container_name: cloudflared
        image: docker.io/cloudflare/cloudflared:latest
        restart: unless-stopped
        command: tunnel run
        environment:
            NO_AUTOUPDATE: "true"
            TUNNEL_TRANSPORT_PROTOCOL: "quic"
            TUNNEL_TOKEN: ""
        networks: [ biolak-network ]

networks:
    biolak-network:
        name: biolak
