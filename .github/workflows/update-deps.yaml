name: Weekly Dependency Update

on:
    schedule:
        - cron: '0 2 * * 1' # Runs every Monday at 9:00 AM UTC+7
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Install just
              uses: extractions/setup-just@v4

            - uses: pnpm/action-setup@v6
              with:
                  version: 11

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install

            - run: pnpm upgrade

            - name: Check for changes
              id: changes
              run: |
                  if ! git diff --quiet; then
                      echo "changed=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "changed=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Run checks
              if: steps.changes.outputs.changed == 'true'
              id: check
              continue-on-error: true
              run: just check

            - name: Create PR
              if: steps.changes.outputs.changed == 'true' && steps.check.outcome == 'success'
              uses: peter-evans/create-pull-request@v8.1.1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: 'chore(deps): weekly dependency update'
                  title: 'chore(deps): weekly dependency update'
                  branch: chore/update-deps
                  delete-branch: true
                  labels: dependencies