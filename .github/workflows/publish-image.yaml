name: Publish Docker Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          TAG=$(git rev-parse --short HEAD)
          docker build -t ghcr.io/${{ github.repository }}:$TAG -t ghcr.io/${{ github.repository }}:latest .
          docker push --compression-format zstd --compression-level 9 ghcr.io/${{ github.repository }}:$TAG
          docker push --compression-format zstd --compression-level 9 ghcr.io/${{ github.repository }}:latest
